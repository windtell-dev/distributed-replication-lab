services:
  node1:
    build: .
    container_name: node1
    environment:
      - NODE_NAME=node1
      - PEERS=http://node2:3000,http://node3:3000
    ports:
      - "3000:3000"
    depends_on:
      - node2
      - node3

  node2:
    build: .
    container_name: node2
    environment:
      - NODE_NAME=node2
      - PEERS=http://node1:3000,http://node3:3000
    ports:
      - "3001:3000"

  node3:
    build: .
    container_name: node3
    environment:
      - NODE_NAME=node3
      - PEERS=http://node1:3000,http://node2:3000
    ports:
      - "3002:3000"